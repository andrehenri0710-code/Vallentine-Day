<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px solid #ffc0cb;
            max-width: 350px;
            width: 90%;
            z-index: 10;
            box-sizing: border-box;
        }

        h1 {
            color: #ff1493;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* AJUSTE DO GIF: Adicionado para que ele fique perfeito dentro do container */
        img {
            width: 220px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
            align-items: center;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #btnSim {
            background-color: #ff69b4;
            color: white;
        }

        #btnSim:hover {
            transform: scale(1.1);
            background-color: #ff1493;
        }

        #btnNao {
            background-color: #999;
            color: white;
            position: absolute;
        }

        .hearts {
            position: absolute;
            font-size: 22px;
            animation: float 5s linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sarah, fiz uma coisa para você... Gostaria de ver?</h1>
        <img src="https://i.pinimg.com/originals/a0/e8/b7/a0e8b7ee969a38580c0d22e830422e44.gif" alt="Urso entregando flores">
        
        <div class="buttons">
            <button id="btnSim" onclick="irParaProxima()">Sim</button>
            <button id="btnNao" onmouseover="furgir()" ontouchstart="furgir(); event.preventDefault();" onclick="furgir()">Não</button>
        </div>
    </div>

    <script>
        function furgir() {
            const btnNao = document.getElementById('btnNao');
            const botaoLargura = btnNao.offsetWidth;
            const botaoAltura = btnNao.offsetHeight;

            const larguraJanela = window.innerWidth - botaoLargura - 20;
            const alturaJanela = window.innerHeight - botaoAltura - 20;

            const novoX = Math.max(20, Math.random() * larguraJanela);
            const novoY = Math.max(20, Math.random() * alturaJanela);

            btnNao.style.position = 'fixed';
            btnNao.style.margin = '0';
            btnNao.style.left = novoX + 'px';
            btnNao.style.top = novoY + 'px';
        }

        function irParaProxima() {
            window.location.href = "flores.html";
        }

        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('hearts');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }, 1000);
    </script>
</body>
</html>
